apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-vue-auth-deployment
  labels:
    app: test-vue-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-vue-auth
  template:
    metadata:
      labels:
        app: test-vue-auth
    spec:
      containers:
      - name: test-vue-auth
        image: prakasitnan/test-vue-auth:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: test-vue-auth-service
spec:
  selector:
    app: test-vue-auth
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
